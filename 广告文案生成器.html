<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta 广告文案生成器 · México</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #c8445a;
    --accent2: #e8834a;
    --text: #f0eff4;
    --text2: #9090a8;
    --green: #3dd68c;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 32px 20px;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
  }

  .logo {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }

  h1 span {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle { font-size: 13px; color: var(--text2); margin-top: 2px; }

  /* Upload Zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #1e161a; }

  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  .upload-icon { font-size: 36px; margin-bottom: 12px; }

  .upload-zone h3 { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 6px; }

  .upload-zone p { font-size: 13px; color: var(--text2); }

  .preview-wrap {
    display: none;
    align-items: center;
    gap: 16px;
    text-align: left;
  }

  .preview-wrap img {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 10px;
    border: 2px solid var(--border);
  }

  .preview-info h4 { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .preview-info p { font-size: 12px; color: var(--text2); }

  /* Config Row */
  .config-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 16px;
  }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .field select, .field input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field select:focus, .field input:focus { border-color: var(--accent); }

  /* Generate Button */
  .btn-generate {
    width: 100%;
    margin-top: 20px;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius);
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-generate:hover { opacity: 0.92; transform: translateY(-1px); }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 40px;
    color: var(--text2);
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-size: 14px; }
  .loading-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

  /* Results */
  .results { display: none; margin-top: 28px; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .results-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
  }

  .badge {
    background: #1a2e22;
    color: var(--green);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid #2a4a32;
  }

  /* Tab System */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    padding: 4px;
    border-radius: 10px;
    margin-bottom: 20px;
    overflow-x: auto;
  }

  .tab {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text2);
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .tab.active {
    background: var(--surface2);
    color: var(--text);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Copy Cards */
  .copy-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    position: relative;
  }

  .copy-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .copy-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--accent2);
  }

  .copy-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    font-size: 12px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--text); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }

  .copy-content {
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--text);
  }

  /* Title Table */
  .title-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .title-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .title-item-left { flex: 1; }
  .title-item-text { font-size: 14px; font-weight: 500; }
  .title-item-tag {
    font-size: 11px;
    color: var(--text2);
    margin-top: 3px;
  }

  /* Combos */
  .combo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 12px;
  }

  .combo-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .combo-row { margin-bottom: 6px; font-size: 13px; }
  .combo-row span { color: var(--text2); font-size: 12px; margin-right: 6px; }

  /* Hashtags */
  .hashtag-wrap { display: flex; flex-wrap: wrap; gap: 8px; }

  .hashtag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    color: var(--accent2);
    cursor: pointer;
    transition: all 0.2s;
  }

  .hashtag:hover { border-color: var(--accent2); background: #1e1a14; }

  /* Reset btn */
  .btn-reset {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    font-size: 13px;
    padding: 8px 16px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    margin-top: 24px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-reset:hover { border-color: var(--text2); color: var(--text); }

  .error-msg {
    background: #2a1018;
    border: 1px solid #5a2030;
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 13px;
    color: #f08090;
    margin-top: 16px;
    display: none;
  }

  @media (max-width: 600px) {
    .config-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">📣</div>
    <div>
      <h1>Meta 广告文案 <span>自动生成器</span></h1>
      <p class="subtitle">上传产品图片 · AI 自动分析 · 一键生成西班牙语文案</p>
    </div>
  </header>

  <!-- Upload -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*">
    <div id="uploadDefault">
      <div class="upload-icon">🖼️</div>
      <h3>点击上传产品图片</h3>
      <p>支持 JPG、PNG、WEBP · 拖拽也可以</p>
    </div>
    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="">
      <div class="preview-info">
        <h4 id="previewName">图片已上传</h4>
        <p id="previewSize">点击更换图片</p>
      </div>
    </div>
  </div>

  <!-- Config -->
  <div class="config-row">
    <div class="field">
      <label>目标国家</label>
      <select id="country">
        <option value="México">🇲🇽 墨西哥</option>
        <option value="Colombia">🇨🇴 哥伦比亚</option>
        <option value="Argentina">🇦🇷 阿根廷</option>
        <option value="Chile">🇨🇱 智利</option>
        <option value="España">🇪🇸 西班牙</option>
      </select>
    </div>
    <div class="field">
      <label>广告平台</label>
      <select id="platform">
        <option value="Meta (Facebook & Instagram)">Meta (Facebook & Instagram)</option>
        <option value="TikTok">TikTok</option>
        <option value="Google Ads">Google Ads</option>
      </select>
    </div>
    <div class="field">
      <label>受众人群</label>
      <select id="audience">
        <option value="público general sin restricción de segmento">🌐 不限（大众）</option>
        <option value="profesionales de salud (enfermeras, médicos, personal médico)">医护人员</option>
        <option value="mujeres 25-45 años">女性 25-45岁</option>
        <option value="trabajadores del hogar">家政服务人员</option>
        <option value="trabajadores de restaurantes">餐饮从业者</option>
        <option value="público general consumidor">大众消费者</option>
      </select>
    </div>
    <div class="field">
      <label>广告目标</label>
      <select id="objective">
        <option value="conversión (ventas)">转化/销售</option>
        <option value="reconocimiento de marca">品牌认知</option>
        <option value="tráfico al sitio web">网站流量</option>
        <option value="interacción y engagement">互动参与</option>
      </select>
    </div>
  </div>

  <button class="btn-generate" id="generateBtn" disabled>
    <span>⚡</span> 生成广告文案
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">AI 正在分析图片并生成文案...</div>
    <div class="loading-sub">通常需要 10~20 秒</div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results-header">
      <h2>生成结果</h2>
      <span class="badge">✓ 生成完成</span>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('headlines')">📌 广告标题</button>
      <button class="tab" onclick="switchTab('body')">📝 广告正文</button>
      <button class="tab" onclick="switchTab('combos')">🎯 推荐组合</button>
      <button class="tab" onclick="switchTab('hashtags')">🏷️ Hashtags</button>
    </div>

    <div id="tab-headlines" class="tab-content active">
      <div id="headlinesContent"></div>
    </div>
    <div id="tab-body" class="tab-content">
      <div id="bodyContent"></div>
    </div>
    <div id="tab-combos" class="tab-content">
      <div id="combosContent"></div>
    </div>
    <div id="tab-hashtags" class="tab-content">
      <div id="hashtagsContent"></div>
    </div>

    <button class="btn-reset" onclick="resetAll()">↩ 重新上传图片</button>
  </div>

</div>

<script>
  let imageBase64 = '';
  let imageMime = 'image/jpeg';

  const fileInput = document.getElementById('fileInput');
  const uploadZone = document.getElementById('uploadZone');
  const generateBtn = document.getElementById('generateBtn');

  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) handleFile(file);
  });

  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  function handleFile(file) {
    imageMime = file.type || 'image/jpeg';
    document.getElementById('previewName').textContent = file.name;
    document.getElementById('previewSize').textContent = (file.size / 1024).toFixed(0) + ' KB · 点击更换';

    const reader = new FileReader();
    reader.onload = ev => {
      const dataUrl = ev.target.result;
      imageBase64 = dataUrl.split(',')[1];
      document.getElementById('previewImg').src = dataUrl;
      document.getElementById('uploadDefault').style.display = 'none';
      document.getElementById('previewWrap').style.display = 'flex';
      generateBtn.disabled = false;
    };
    reader.readAsDataURL(file);
  }

  generateBtn.addEventListener('click', generateCopy);

  async function generateCopy() {
    if (!imageBase64) return;

    const country = document.getElementById('country').value;
    const platform = document.getElementById('platform').value;
    const audience = document.getElementById('audience').value;
    const objective = document.getElementById('objective').value;

    document.getElementById('loading').style.display = 'block';
    document.getElementById('results').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'none';
    generateBtn.disabled = true;

    const targetLang = document.getElementById('country').value === 'España' ? '西班牙语' : '西班牙语';
    const prompt = `Analiza esta imagen de producto y genera textos publicitarios completos en español para ${platform} dirigidos al mercado de ${country}.

Audiencia objetivo: ${audience}
Objetivo de campaña: ${objective}

IMPORTANTE: Responde ÚNICAMENTE con un objeto JSON válido. Sin texto antes ni después. Sin bloques de código markdown. Sin backticks. Solo el JSON puro.

Para CADA campo de texto publicitario, proporciona DOS versiones: el texto original en español Y su traducción al chino mandarín (中文翻译) para que el equipo chino pueda revisar el contenido.

El JSON debe tener exactamente esta estructura:

{"product_summary":"descripcion del producto","product_summary_zh":"产品描述中文翻译","headlines_primary":[{"text":"titular 1","text_zh":"中文翻译","style":"funcional"},{"text":"titular 2","text_zh":"中文翻译","style":"emocional"},{"text":"titular 3","text_zh":"中文翻译","style":"creativo"},{"text":"titular 4","text_zh":"中文翻译","style":"directo"},{"text":"titular 5","text_zh":"中文翻译","style":"imagen de marca"}],"headlines_secondary":[{"text":"subtitular 1","text_zh":"中文翻译"},{"text":"subtitular 2","text_zh":"中文翻译"},{"text":"subtitular 3","text_zh":"中文翻译"},{"text":"subtitular 4","text_zh":"中文翻译"},{"text":"subtitular 5","text_zh":"中文翻译"}],"body_v1":{"style":"情感共鸣型","label":"Versión Emocional","text":"texto 100-130 palabras emocional con muchos emojis 💛✨🙌❤️ bullets ✅ y CTA al final","text_zh":"中文翻译"},"body_v2":{"style":"功能利益型","label":"Versión Funcional","text":"texto 100-130 palabras beneficios concretos emojis 💪🔥⚡✨ bullets ✅ y CTA al final","text_zh":"中文翻译"},"body_v3":{"style":"娱乐互动型","label":"Versión Interactiva","text":"texto 100-130 palabras dinamico pregunta al inicio muchos emojis 🎉😍👇🔥💥 bullets ✅ CTA urgente al final","text_zh":"中文翻译"},"combos":[{"label":"Combo A · Conversión","headline":"titular","headline_zh":"中文","subheadline":"subtitular","subheadline_zh":"中文","reason":"por que funciona","reason_zh":"原因中文说明"},{"label":"Combo B · Emoción","headline":"titular","headline_zh":"中文","subheadline":"subtitular","subheadline_zh":"中文","reason":"por que funciona","reason_zh":"原因中文说明"},{"label":"Combo C · Función","headline":"titular","headline_zh":"中文","subheadline":"subtitular","subheadline_zh":"中文","reason":"por que funciona","reason_zh":"原因中文说明"}],"hashtags":["#tag1","#tag2","#tag3","#tag4","#tag5","#tag6","#tag7","#tag8"],"tip":"consejo publicitario","tip_zh":"投放建议中文说明"}`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4000,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: imageMime, data: imageBase64 } },
              { type: 'text', text: prompt }
            ]
          }]
        })
      });

      const data = await response.json();

      // Check for API-level errors
      if (data.error) throw new Error('API错误：' + data.error.message);

      const rawText = data.content.map(b => b.text || '').join('');

      let json;
      try {
        // Try multiple extraction strategies
        let clean = rawText.trim();

        // Strategy 1: strip markdown fences
        clean = clean.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/i, '').trim();

        // Strategy 2: extract first { ... } block
        const firstBrace = clean.indexOf('{');
        const lastBrace = clean.lastIndexOf('}');
        if (firstBrace !== -1 && lastBrace !== -1) {
          clean = clean.slice(firstBrace, lastBrace + 1);
        }

        json = JSON.parse(clean);
      } catch (parseErr) {
        // Show raw text for debugging
        console.error('Raw AI response:', rawText);
        throw new Error('AI 返回格式异常，请重试（错误：' + parseErr.message + '）');
      }

      renderResults(json);

    } catch (err) {
      document.getElementById('errorMsg').textContent = '生成失败：' + err.message;
      document.getElementById('errorMsg').style.display = 'block';
    } finally {
      document.getElementById('loading').style.display = 'none';
      generateBtn.disabled = false;
    }
  }

  function renderResults(d) {
    // Headlines
    let hl = `<div style="background:var(--surface2);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;line-height:1.6;">
      <div style="color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">产品简介</div>
      <div>${d.product_summary}</div>
      <div style="color:var(--text2);margin-top:6px;font-size:12px;">【中文】${d.product_summary_zh || ''}</div>
    </div>`;

    hl += `<div style="margin-bottom:18px;"><div class="copy-label" style="margin-bottom:10px;">主标题 · Primary Headlines</div><div class="title-grid">`;
    d.headlines_primary.forEach(h => {
      hl += `<div class="title-item">
        <div class="title-item-left">
          <div class="title-item-text">${h.text}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:3px;">【中文】${h.text_zh || ''}</div>
          <div class="title-item-tag" style="margin-top:4px;">${h.style}</div>
        </div>
        <button class="copy-btn" onclick="copyText(this, '${escQ(h.text)}')">📋 复制</button>
      </div>`;
    });
    hl += `</div></div>`;

    hl += `<div><div class="copy-label" style="margin-bottom:10px;">副标题 · Secondary Headlines</div><div class="title-grid">`;
    d.headlines_secondary.forEach(h => {
      hl += `<div class="title-item">
        <div class="title-item-left">
          <div class="title-item-text">${h.text}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:3px;">【中文】${h.text_zh || ''}</div>
        </div>
        <button class="copy-btn" onclick="copyText(this, '${escQ(h.text)}')">📋 复制</button>
      </div>`;
    });
    hl += `</div></div>`;
    document.getElementById('headlinesContent').innerHTML = hl;

    // Body
    let body = '';
    const versions = [d.body_v1, d.body_v2, d.body_v3];
    const styleColors = ['#e87c4a', '#4a9ee8', '#3dd68c'];
    versions.forEach((v, i) => {
      if (!v) return;
      body += `<div class="copy-card" style="border-left: 3px solid ${styleColors[i]}">
        <div class="copy-card-header">
          <div>
            <div class="copy-label" style="color:${styleColors[i]}">${v.label || '版本 ' + (i+1)}</div>
            <div style="font-size:11px;color:var(--text2);margin-top:2px;">${v.style || ''} · 适用所有版位</div>
          </div>
          <button class="copy-btn" onclick="copyText(this, '${escQ(v.text)}')">📋 复制原文</button>
        </div>
        <div class="copy-content" style="margin-bottom:12px;">${(v.text || '').replace(/\n/g, '<br>')}</div>
        <div style="border-top:1px solid var(--border);padding-top:12px;">
          <div style="font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;">【中文对照】</div>
          <div style="font-size:13px;color:var(--text2);line-height:1.7;">${(v.text_zh || '').replace(/\n/g, '<br>')}</div>
        </div>
      </div>`;
    });
    if (d.tip) {
      body += `<div style="background:#1a1e14;border:1px solid #2a3a1a;border-radius:10px;padding:14px 16px;font-size:13px;color:#a0c080;margin-top:4px;">
        💡 <strong>投放建议：</strong>${d.tip_zh || d.tip}
        ${d.tip_zh ? `<div style="color:#6a9060;font-size:12px;margin-top:6px;">${d.tip}</div>` : ''}
      </div>`;
    }
    document.getElementById('bodyContent').innerHTML = body;

    // Combos
    let combos = '';
    d.combos.forEach(c => {
      combos += `<div class="combo-card">
        <div class="combo-label">${c.label}</div>
        <div class="combo-row">
          <span>主标题：</span>${c.headline}
          <div style="font-size:12px;color:var(--text2);margin-top:2px;margin-left:0;">【中文】${c.headline_zh || ''}</div>
        </div>
        <div class="combo-row" style="margin-top:8px;">
          <span>副标题：</span>${c.subheadline}
          <div style="font-size:12px;color:var(--text2);margin-top:2px;">【中文】${c.subheadline_zh || ''}</div>
        </div>
        <div style="font-size:12px;color:var(--text2);margin-top:10px;">✦ ${c.reason_zh || c.reason}</div>
        <button class="copy-btn" style="margin-top:10px;" onclick="copyText(this, '主标题：${escQ(c.headline)}\\n副标题：${escQ(c.subheadline)}')">📋 复制组合</button>
      </div>`;
    });
    document.getElementById('combosContent').innerHTML = combos;

    // Hashtags
    let tags = '<div class="hashtag-wrap">';
    d.hashtags.forEach(t => {
      tags += `<div class="hashtag" onclick="copyText(this, '${escQ(t)}')" title="点击复制">${t}</div>`;
    });
    tags += '</div>';
    tags += `<p style="font-size:12px;color:var(--text2);margin-top:14px;">点击任意标签即可复制 · 建议选用 5-8 个</p>`;
    const allTags = d.hashtags.join(' ');
    tags += `<button class="copy-btn" style="margin-top:12px;" onclick="copyText(this, '${escQ(allTags)}')">📋 一键复制全部</button>`;
    document.getElementById('hashtagsContent').innerHTML = tags;

    document.getElementById('results').style.display = 'block';
  }

  function copyCard(label, text) {
    return `<div class="copy-card">
      <div class="copy-card-header">
        <div class="copy-label">${label}</div>
        <button class="copy-btn" onclick="copyText(this, '${escQ(text)}')">📋 复制</button>
      </div>
      <div class="copy-content">${text}</div>
    </div>`;
  }

  function escQ(str) {
    return (str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');
  }

  function copyText(btn, text) {
    const decoded = text.replace(/\\n/g, '\n').replace(/\\'/g, "'");
    navigator.clipboard.writeText(decoded).then(() => {
      btn.textContent = '✓ 已复制';
      btn.classList.add('copied');
      setTimeout(() => { btn.innerHTML = '📋 复制'; btn.classList.remove('copied'); }, 1800);
    });
  }

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelector(`[onclick="switchTab('${name}')"]`).classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  function resetAll() {
    imageBase64 = '';
    fileInput.value = '';
    document.getElementById('uploadDefault').style.display = 'block';
    document.getElementById('previewWrap').style.display = 'none';
    document.getElementById('results').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'none';
    generateBtn.disabled = true;
  }
</script>
</body>
</html>
